services:
  redis:
    image: redis:8.6-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  server:
    image: ghcr.io/minyic7/claudehub-server:latest
    restart: unless-stopped
    ports:
      - "7700:7700"
    depends_on:
      redis: { condition: service_healthy }
    volumes:
      - repos-data:/repos
      - ~/.claude:/home/claudehub/.claude
      - ~/.claude.json:/home/claudehub/.claude.json
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      HOST: "0.0.0.0"
      PORT: "7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    image: ghcr.io/minyic7/claudehub-web:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/claudehub/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  redis-data:
  repos-data:
